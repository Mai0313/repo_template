  redis:
    image: redis:alpine
    command: redis-server --maxclients 10000
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 1s
      retries: 5
    ports:
      - 127.0.0.1:${REDIS_PORT:-6379}:6379
    volumes:
      - ./data/redis:/data
      # - redis-data:/data
    restart: always
    pull_policy: always

  postgresql:
    image: postgres:alpine
    command: postgres -c max_connections=500 -c shared_buffers=256MB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      start_period: 10s
      timeout: 1s
      retries: 5
      interval: 5s
    ports:
      - 127.0.0.1:${POSTGRES_PORT:-5432}:5432
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
      # - postgresql-data:/var/lib/postgresql/data
    restart: always
    pull_policy: always

  mongodb:
    image: mongo:latest
    command: mongod --maxConns 5000
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 5s
      timeout: 1s
      retries: 5
      start_period: 10s
    ports:
      - 127.0.0.1:${MONGO_PORT:-27017}:${MONGO_PORT:-27017}
    volumes:
      - ./data/mongodb:/data/db
      # - mongo-data:/data/db
    restart: always
    pull_policy: always

  mysql:
    image: mysql:latest
    command: --max_connections=500
    healthcheck:
      test: mysqladmin ping -h localhost
      interval: 5s
      timeout: 1s
      retries: 5
      start_period: 10s
    ports:
      - 127.0.0.1:${MYSQL_PORT:-3306}:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mysql}
      MYSQL_USER: ${MYSQL_USER:-mysql}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mysql}
    volumes:
      - ./data/mysql:/var/lib/mysql
      # - mysql-data:/var/lib/mysql
    restart: always
    pull_policy: always

